<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BAC PRO CIEL – Vidéos</title>
    <link rel="stylesheet" href="site.css">
    <style>
        /* Modale vidéo */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.88);
            z-index: 999;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 16px;
        }
        .modal.open { display: flex; }
        .modal video {
            max-width: 90vw;
            max-height: 80vh;
            border-radius: 8px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.6);
        }
        .modal-close {
            position: absolute;
            top: 20px; right: 28px;
            font-size: 2rem;
            color: #fff;
            cursor: pointer;
            background: none;
            border: none;
        }

        /* Zone d'ajout */
        .upload-zone {
            border: 2px dashed var(--border);
            border-radius: var(--radius);
            padding: 40px;
            text-align: center;
            color: var(--gris);
            background: var(--surface);
            margin-bottom: 32px;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
        }
        .upload-zone:hover { border-color: var(--rouge); background: #fff8f8; }
        .upload-zone .upload-icon { font-size: 2.5rem; margin-bottom: 10px; }
        .upload-zone input { display: none; }

        /* Durée badge */
        .duration-badge {
            position: absolute;
            bottom: 8px; right: 8px;
            background: rgba(0,0,0,0.7);
            color: #fff;
            font-size: 0.75rem;
            padding: 2px 7px;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <!-- NAVBAR -->
    <nav>
        <div class="nav-inner">
            <div class="nav-logo">Projet CIEL <span>BAC PRO</span></div>
            <ul class="nav-links">
                <li><a href="accueil.html">🏠 Accueil</a></li>
                <li><a href="photos.html">🖼️ Photos</a></li>
                <li><a href="videos.html" class="active">🎬 Vidéos</a></li>
                
            </ul>
        </div>
    </nav>

    <!-- CONTENU -->
    <div class="page-wrapper">

        <div class="section-header">
            <h2>Galerie Vidéos</h2>
            <span class="count" id="video-count">0</span>
        </div>

        <!-- Zone d'ajout -->
        <label class="upload-zone" for="input-video">
            <div class="upload-icon">🎬</div>
            <p><strong>Cliquez pour ajouter des vidéos</strong> ou glissez-déposez ici</p>
            <p style="font-size:0.8rem; margin-top:6px;">MP4, WebM, MOV acceptés</p>
            <input type="file" id="input-video" accept="video/*" multiple>
        </label>

        <!-- Grille de vidéos -->
        <div class="cards-grid" id="video-grid">
            <p style="color:var(--gris); font-size:0.95rem;" id="empty-msg">
                Aucune vidéo pour l'instant. Ajoutez-en avec le bouton ci-dessus !
            </p>
        </div>

    </div>

    <!-- MODALE VIDÉO -->
    <div class="modal" id="modal">
        <button class="modal-close" onclick="fermerModal()">✕</button>
        <video id="modal-video" controls></video>
    </div>

    <!-- FOOTER -->
    <footer>
        <p>Projet réalisé dans le cadre du <strong>BAC PRO CIEL</strong> &mdash; Année 2026</p>
    </footer>

    <script>
        const input    = document.getElementById("input-video");
        const grid     = document.getElementById("video-grid");
        const countEl  = document.getElementById("video-count");
        let videos = [];

        input.addEventListener("change", e => {
            const files = Array.from(e.target.files);
            files.forEach(file => {
                const url = URL.createObjectURL(file);
                videos.push({ url, nom: file.name });
                afficherVideos();
            });
        });

        // Glisser-déposer
        const uploadZone = document.querySelector(".upload-zone");
        uploadZone.addEventListener("dragover", e => { e.preventDefault(); uploadZone.style.borderColor = "var(--rouge)"; });
        uploadZone.addEventListener("dragleave", () => { uploadZone.style.borderColor = "var(--border)"; });
        uploadZone.addEventListener("drop", e => {
            e.preventDefault();
            uploadZone.style.borderColor = "var(--border)";
            const files = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith("video/"));
            files.forEach(file => {
                const url = URL.createObjectURL(file);
                videos.push({ url, nom: file.name });
                afficherVideos();
            });
        });

        function afficherVideos() {
            const emptyMsg = document.getElementById("empty-msg");
            if (emptyMsg) emptyMsg.remove();
            grid.innerHTML = "";
            countEl.textContent = videos.length;

            videos.forEach((video, idx) => {
                const card = document.createElement("div");
                card.className = "card fade-in";
                card.innerHTML = `
                    <div class="card-thumb" onclick="ouvrirModal(${idx})" style="background:#1a1a2e;">
                        <div class="play-btn">▶</div>
                        <span class="duration-badge">Vidéo ${idx + 1}</span>
                    </div>
                    <div class="card-body">
                        <div class="card-title">${video.nom}</div>
                        <div class="card-meta" style="display:flex;justify-content:space-between;">
                            <span>Vidéo ${idx + 1}</span>
                            <span style="color:var(--rouge);cursor:pointer;" onclick="supprimerVideo(${idx})">🗑️ Supprimer</span>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function supprimerVideo(idx) {
            videos.splice(idx, 1);
            if (videos.length === 0) {
                grid.innerHTML = `<p style="color:var(--gris); font-size:0.95rem;" id="empty-msg">Aucune vidéo pour l'instant. Ajoutez-en avec le bouton ci-dessus !</p>`;
                countEl.textContent = 0;
            } else {
                afficherVideos();
            }
        }

        function ouvrirModal(idx) {
            document.getElementById("modal").classList.add("open");
            document.getElementById("modal-video").src = videos[idx].url;
            document.getElementById("modal-video").play();
        }

        function fermerModal() {
            const modal = document.getElementById("modal");
            const video = document.getElementById("modal-video");
            video.pause();
            video.src = "";
            modal.classList.remove("open");
        }

        document.getElementById("modal").addEventListener("click", function(e) {
            if (e.target === this) fermerModal();
        });
    </script>

</body>
</html>
